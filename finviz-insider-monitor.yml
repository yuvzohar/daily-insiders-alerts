name: Finviz Insider Buy Monitor

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes (UTC). GitHub may delay under load.
  workflow_dispatch:          # allow manual runs from the Actions tab

# Prevent overlapping runs from racing on the committed state file
concurrency:
  group: finviz-insider-monitor
  cancel-in-progress: false

permissions:
  contents: write             # needed to commit the state file back

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor
        env:
          CLICKUP_API_TOKEN: ${{ secrets.CLICKUP_API_TOKEN }}
          CLICKUP_WORKSPACE_ID: "90182578127"
          CLICKUP_LIST_ID: "901818545610"
          CLICKUP_CHANNEL_ID: "2kzmtvyf-698"
          FINVIZ_STATE_FILE: .state/seen.json
          # Optional filters (set as repo vars or leave blank for defaults)
          MIN_VALUE_USD: ${{ vars.MIN_VALUE_USD }}       # e.g. 50000 — skip buys below this value
          MIN_SHARES: ${{ vars.MIN_SHARES }}             # e.g. 1000  — skip buys below this share count
        run: python finviz_monitor.py

      - name: Persist dedupe state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .state/seen.json
          if git diff --staged --quiet; then
            echo "No new insider buys — state unchanged."
          else
            git commit -m "chore: update Finviz insider dedupe state [skip ci]"
            git push
          fi
